<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 200px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8B7355 70%, #8B7355 100%);
            border: 2px solid #333;
            overflow: hidden;
        }

        #dino {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #4a4a4a;
            border-radius: 5px;
            transition: bottom 0.1s;
        }

        #dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #4a4a4a;
            border-radius: 10px;
        }

        #dino::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: -5px;
            width: 15px;
            height: 15px;
            background: #4a4a4a;
            border-radius: 0 0 5px 5px;
        }

        .cactus {
            position: absolute;
            bottom: 50px;
            width: 20px;
            height: 40px;
            background: #228B22;
            border-radius: 5px 5px 0 0;
        }

        .cactus::before {
            content: '';
            position: absolute;
            top: 10px;
            left: -8px;
            width: 15px;
            height: 20px;
            background: #228B22;
            border-radius: 5px;
        }

        .cactus::after {
            content: '';
            position: absolute;
            top: 5px;
            right: -8px;
            width: 12px;
            height: 15px;
            background: #228B22;
            border-radius: 5px;
        }

        .cloud {
            position: absolute;
            top: 30px;
            width: 60px;
            height: 20px;
            background: white;
            border-radius: 20px;
            opacity: 0.8;
        }

        .cloud::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 10px;
            width: 25px;
            height: 25px;
            background: white;
            border-radius: 50%;
        }

        .cloud::after {
            content: '';
            position: absolute;
            top: -5px;
            right: 15px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        #gameOver h2 {
            color: #333;
            margin-bottom: 10px;
        }

        #gameOver button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #gameOver button:hover {
            background: #45a049;
        }

        #instructions {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .jumping {
            animation: jump 0.5s ease-in-out;
        }

        @keyframes jump {
            0%, 100% { bottom: 50px; }
            50% { bottom: 120px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="dino"></div>
        <div id="score">Score: 0</div>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
        <div id="instructions">
            Press SPACEBAR or click to jump
        </div>
    </div>

    <script>
        class DinoGame {
            constructor() {
                this.gameContainer = document.getElementById('gameContainer');
                this.dino = document.getElementById('dino');
                this.scoreElement = document.getElementById('score');
                this.gameOverElement = document.getElementById('gameOver');
                this.finalScoreElement = document.getElementById('finalScore');
                
                this.isJumping = false;
                this.isGameRunning = false;
                this.score = 0;
                this.gameSpeed = 2;
                this.obstacles = [];
                this.clouds = [];
                this.gameLoop = null;
                
                this.init();
            }
            
            init() {
                this.bindEvents();
                this.startGame();
            }
            
            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.jump();
                    }
                });
                
                this.gameContainer.addEventListener('click', () => {
                    this.jump();
                });
            }
            
            jump() {
                if (!this.isJumping && this.isGameRunning) {
                    this.isJumping = true;
                    this.dino.classList.add('jumping');
                    
                    setTimeout(() => {
                        this.dino.classList.remove('jumping');
                        this.isJumping = false;
                    }, 500);
                }
            }
            
            startGame() {
                this.isGameRunning = true;
                this.score = 0;
                this.gameSpeed = 2;
                this.obstacles = [];
                this.clouds = [];
                this.updateScore();
                this.gameOverElement.style.display = 'none';
                
                // Clear existing obstacles and clouds
                document.querySelectorAll('.cactus, .cloud').forEach(el => el.remove());
                
                this.gameLoop = setInterval(() => {
                    this.update();
                }, 20);
                
                // Spawn obstacles
                this.obstacleSpawner = setInterval(() => {
                    this.spawnObstacle();
                }, 2000);
                
                // Spawn clouds
                this.cloudSpawner = setInterval(() => {
                    this.spawnCloud();
                }, 3000);
            }
            
            spawnObstacle() {
                if (!this.isGameRunning) return;
                
                const cactus = document.createElement('div');
                cactus.className = 'cactus';
                cactus.style.right = '-20px';
                this.gameContainer.appendChild(cactus);
                
                this.obstacles.push({
                    element: cactus,
                    x: 820
                });
            }
            
            spawnCloud() {
                if (!this.isGameRunning) return;
                
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                cloud.style.right = '-60px';
                cloud.style.top = Math.random() * 50 + 20 + 'px';
                this.gameContainer.appendChild(cloud);
                
                this.clouds.push({
                    element: cloud,
                    x: 860
                });
            }
            
            update() {
                if (!this.isGameRunning) return;
                
                // Update score
                this.score += 1;
                if (this.score % 100 === 0) {
                    this.gameSpeed += 0.5;
                }
                this.updateScore();
                
                // Update obstacles
                this.obstacles.forEach((obstacle, index) => {
                    obstacle.x -= this.gameSpeed;
                    obstacle.element.style.right = (800 - obstacle.x) + 'px';
                    
                    // Check collision
                    if (this.checkCollision(obstacle)) {
                        this.gameOver();
                        return;
                    }
                    
                    // Remove obstacle if off screen
                    if (obstacle.x < -20) {
                        obstacle.element.remove();
                        this.obstacles.splice(index, 1);
                    }
                });
                
                // Update clouds
                this.clouds.forEach((cloud, index) => {
                    cloud.x -= this.gameSpeed * 0.5;
                    cloud.element.style.right = (800 - cloud.x) + 'px';
                    
                    // Remove cloud if off screen
                    if (cloud.x < -60) {
                        cloud.element.remove();
                        this.clouds.splice(index, 1);
                    }
                });
            }
            
            checkCollision(obstacle) {
                const dinoRect = {
                    left: 50,
                    right: 90,
                    top: this.isJumping ? 80 : 160,
                    bottom: 200
                };
                
                const obstacleRect = {
                    left: obstacle.x,
                    right: obstacle.x + 20,
                    top: 160,
                    bottom: 200
                };
                
                return dinoRect.left < obstacleRect.right &&
                       dinoRect.right > obstacleRect.left &&
                       dinoRect.top < obstacleRect.bottom &&
                       dinoRect.bottom > obstacleRect.top;
            }
            
            updateScore() {
                this.scoreElement.textContent = `Score: ${this.score}`;
            }
            
            gameOver() {
                this.isGameRunning = false;
                clearInterval(this.gameLoop);
                clearInterval(this.obstacleSpawner);
                clearInterval(this.cloudSpawner);
                
                this.finalScoreElement.textContent = this.score;
                this.gameOverElement.style.display = 'block';
            }
            
            restart() {
                this.startGame();
            }
        }
        
        let game;
        
        window.onload = () => {
            game = new DinoGame();
        };
        
        function restartGame() {
            game.restart();
        }
    </script>
</body>
</html>
