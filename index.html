<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 200px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8B4513 70%, #8B4513 100%);
            border: 2px solid #333;
            overflow: hidden;
        }

        #dino {
            position: absolute;
            bottom: 30px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.1s;
        }

        #dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        #dino::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 10px;
            width: 20px;
            height: 15px;
            background: #228B22;
            border-radius: 5px;
        }

        .cactus {
            position: absolute;
            bottom: 30px;
            width: 20px;
            height: 40px;
            background: #006400;
            border-radius: 5px;
        }

        .cactus::before {
            content: '';
            position: absolute;
            top: 10px;
            left: -8px;
            width: 15px;
            height: 20px;
            background: #006400;
            border-radius: 3px;
        }

        .cactus::after {
            content: '';
            position: absolute;
            top: 15px;
            right: -8px;
            width: 15px;
            height: 15px;
            background: #006400;
            border-radius: 3px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 20px;
            opacity: 0.8;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #228B22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #006400;
        }

        .jumping {
            animation: jump 0.5s;
        }

        @keyframes jump {
            0% { bottom: 30px; }
            50% { bottom: 100px; }
            100% { bottom: 30px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="dino"></div>
        <div id="score">Score: 0</div>
        
        <div id="startScreen">
            <h2>Dino Run</h2>
            <p>Press SPACE or click to jump over cacti!</p>
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p id="finalScore">Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        let gameRunning = false;
        let score = 0;
        let gameSpeed = 2;
        let obstacles = [];
        let clouds = [];
        let isJumping = false;
        let gameLoop;
        
        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const finalScoreElement = document.getElementById('finalScore');
        
        function startGame() {
            gameRunning = true;
            score = 0;
            gameSpeed = 2;
            obstacles = [];
            clouds = [];
            isJumping = false;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Clear existing obstacles and clouds
            document.querySelectorAll('.cactus').forEach(el => el.remove());
            document.querySelectorAll('.cloud').forEach(el => el.remove());
            
            gameLoop = setInterval(updateGame, 20);
            
            // Generate initial clouds
            for (let i = 0; i < 3; i++) {
                createCloud();
            }
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            score += 1;
            scoreElement.textContent = `Score: ${score}`;
            
            // Increase game speed gradually
            if (score % 500 === 0) {
                gameSpeed += 0.5;
            }
            
            // Generate obstacles
            if (Math.random() < 0.01) {
                createObstacle();
            }
            
            // Generate clouds
            if (Math.random() < 0.005) {
                createCloud();
            }
            
            // Move and check obstacles
            obstacles.forEach((obstacle, index) => {
                obstacle.x -= gameSpeed;
                obstacle.element.style.right = `${800 - obstacle.x}px`;
                
                // Remove obstacles that are off screen
                if (obstacle.x < -50) {
                    obstacle.element.remove();
                    obstacles.splice(index, 1);
                }
                
                // Check collision
                if (checkCollision(obstacle)) {
                    endGame();
                }
            });
            
            // Move clouds
            clouds.forEach((cloud, index) => {
                cloud.x -= gameSpeed * 0.3;
                cloud.element.style.right = `${800 - cloud.x}px`;
                
                // Remove clouds that are off screen
                if (cloud.x < -100) {
                    cloud.element.remove();
                    clouds.splice(index, 1);
                }
            });
        }
        
        function createObstacle() {
            const cactus = document.createElement('div');
            cactus.className = 'cactus';
            cactus.style.right = '0px';
            gameContainer.appendChild(cactus);
            
            obstacles.push({
                element: cactus,
                x: 800,
                width: 20,
                height: 40
            });
        }
        
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.width = '60px';
            cloud.style.height = '20px';
            cloud.style.top = `${Math.random() * 50 + 20}px`;
            cloud.style.right = '0px';
            
            // Add cloud details
            cloud.style.setProperty('--before-width', '25px');
            cloud.style.setProperty('--before-height', '25px');
            cloud.style.setProperty('--before-top', '-10px');
            cloud.style.setProperty('--before-left', '10px');
            
            cloud.style.setProperty('--after-width', '30px');
            cloud.style.setProperty('--after-height', '30px');
            cloud.style.setProperty('--after-top', '-15px');
            cloud.style.setProperty('--after-right', '10px');
            
            gameContainer.appendChild(cloud);
            
            clouds.push({
                element: cloud,
                x: 800
            });
        }
        
        function jump() {
            if (!gameRunning || isJumping) return;
            
            isJumping = true;
            dino.classList.add('jumping');
            
            setTimeout(() => {
                dino.classList.remove('jumping');
                isJumping = false;
            }, 500);
        }
        
        function checkCollision(obstacle) {
            const dinoRect = {
                x: 50,
                y: isJumping ? 100 : 30,
                width: 40,
                height: 40
            };
            
            const obstacleRect = {
                x: obstacle.x,
                y: 30,
                width: obstacle.width,
                height: obstacle.height
            };
            
            return dinoRect.x < obstacleRect.x + obstacleRect.width &&
                   dinoRect.x + dinoRect.width > obstacleRect.x &&
                   dinoRect.y < obstacleRect.y + obstacleRect.height &&
                   dinoRect.y + dinoRect.height > obstacleRect.y;
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'block';
        }
        
        function restartGame() {
            startGame();
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });
        
        gameContainer.addEventListener('click', () => {
            if (!gameRunning && startScreen.style.display !== 'none') {
                startGame();
            } else {
                jump();
            }
        });
        
        // Prevent scrolling when pressing space
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
