<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 800px;
            height: 400px;
            border: 2px solid #333;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            overflow: hidden;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #DEB887;
            border-top: 2px solid #8B7355;
        }

        .dino {
            position: absolute;
            bottom: 120px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.3s ease;
        }

        .dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        .dino::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: -5px;
            width: 15px;
            height: 15px;
            background: #228B22;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            bottom: 120px;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 3px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50px;
        }

        .cloud1 {
            width: 50px;
            height: 20px;
            top: 50px;
            right: 200px;
            animation: moveCloud 15s linear infinite;
        }

        .cloud1::before {
            width: 25px;
            height: 25px;
            top: -12px;
            left: 10px;
        }

        .cloud1::after {
            width: 30px;
            height: 20px;
            top: -8px;
            right: 10px;
        }

        .cloud2 {
            width: 40px;
            height: 15px;
            top: 80px;
            right: 400px;
            animation: moveCloud 20s linear infinite;
        }

        .cloud2::before {
            width: 20px;
            height: 20px;
            top: -8px;
            left: 8px;
        }

        .cloud2::after {
            width: 25px;
            height: 15px;
            top: -5px;
            right: 8px;
        }

        @keyframes moveCloud {
            from { transform: translateX(0); }
            to { transform: translateX(-1000px); }
        }

        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            display: none;
        }

        .game-over h2 {
            color: #333;
            margin: 0 0 10px 0;
        }

        .game-over button {
            background: #228B22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .game-over button:hover {
            background: #32CD32;
        }

        .instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ground"></div>
        <div class="dino" id="dino"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="score" id="score">Score: 0</div>
        <div class="instructions">Press SPACE to jump</div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        class DinoGame {
            constructor() {
                this.dino = document.getElementById('dino');
                this.gameContainer = document.querySelector('.game-container');
                this.scoreElement = document.getElementById('score');
                this.gameOverElement = document.getElementById('gameOver');
                this.finalScoreElement = document.getElementById('finalScore');
                
                this.isJumping = false;
                this.isGameRunning = false;
                this.score = 0;
                this.obstacles = [];
                this.gameSpeed = 2;
                this.obstacleSpawnRate = 0.02;
                
                this.init();
            }

            init() {
                this.bindEvents();
                this.startGame();
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (this.isGameRunning) {
                            this.jump();
                        }
                    }
                });

                document.addEventListener('click', () => {
                    if (this.isGameRunning) {
                        this.jump();
                    }
                });
            }

            jump() {
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.dino.style.bottom = '200px';
                    
                    setTimeout(() => {
                        this.dino.style.bottom = '120px';
                        setTimeout(() => {
                            this.isJumping = false;
                        }, 300);
                    }, 300);
                }
            }

            createObstacle() {
                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle';
                obstacle.style.right = '0px';
                this.gameContainer.appendChild(obstacle);
                this.obstacles.push(obstacle);
            }

            moveObstacles() {
                this.obstacles.forEach((obstacle, index) => {
                    const currentRight = parseInt(obstacle.style.right) || 0;
                    obstacle.style.right = (currentRight + this.gameSpeed) + 'px';

                    // Remove obstacles that are off screen
                    if (currentRight > 820) {
                        obstacle.remove();
                        this.obstacles.splice(index, 1);
                        this.score += 10;
                        this.updateScore();
                    }
                });
            }

            checkCollision() {
                const dinoRect = this.dino.getBoundingClientRect();
                
                this.obstacles.forEach(obstacle => {
                    const obstacleRect = obstacle.getBoundingClientRect();
                    
                    if (dinoRect.left < obstacleRect.right &&
                        dinoRect.right > obstacleRect.left &&
                        dinoRect.top < obstacleRect.bottom &&
                        dinoRect.bottom > obstacleRect.top) {
                        this.gameOver();
                    }
                });
            }

            updateScore() {
                this.scoreElement.textContent = `Score: ${this.score}`;
                
                // Increase game speed as score increases
                if (this.score % 100 === 0 && this.score > 0) {
                    this.gameSpeed += 0.5;
                    this.obstacleSpawnRate += 0.005;
                }
            }

            gameOver() {
                this.isGameRunning = false;
                this.finalScoreElement.textContent = this.score;
                this.gameOverElement.style.display = 'block';
            }

            startGame() {
                this.isGameRunning = true;
                this.score = 0;
                this.gameSpeed = 2;
                this.obstacleSpawnRate = 0.02;
                this.obstacles = [];
                this.updateScore();
                this.gameOverElement.style.display = 'none';
                
                // Clear any existing obstacles
                document.querySelectorAll('.obstacle').forEach(obstacle => {
                    obstacle.remove();
                });
                
                this.gameLoop();
            }

            gameLoop() {
                if (!this.isGameRunning) return;

                // Spawn obstacles randomly
                if (Math.random() < this.obstacleSpawnRate) {
                    this.createObstacle();
                }

                this.moveObstacles();
                this.checkCollision();

                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // Initialize game
        let game;
        
        function startGame() {
            game = new DinoGame();
        }

        function restartGame() {
            if (game) {
                game.startGame();
            }
        }

        // Start the game when page loads
        window.addEventListener('load', startGame);
    </script>
</body>
</html>
