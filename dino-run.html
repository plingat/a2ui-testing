<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            width: 800px;
            height: 400px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            position: relative;
            border: 2px solid #333;
            overflow: hidden;
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #DEB887;
            border-top: 2px solid #8B7355;
        }

        #dino {
            position: absolute;
            bottom: 120px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.3s ease;
        }

        #dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        #dino::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 15px;
            height: 15px;
            background: #228B22;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            bottom: 120px;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 3px;
        }

        .obstacle::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -5px;
            width: 30px;
            height: 30px;
            background: #228B22;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            display: none;
        }

        #gameOver h2 {
            color: #ff4444;
            margin-bottom: 10px;
        }

        #gameOver button {
            background: #228B22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        #gameOver button:hover {
            background: #1e7b1e;
        }

        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 14px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50px;
        }

        .cloud1 {
            width: 50px;
            height: 20px;
            top: 50px;
            animation: moveCloud 15s linear infinite;
        }

        .cloud1::before {
            width: 25px;
            height: 25px;
            top: -12px;
            left: 10px;
        }

        .cloud1::after {
            width: 30px;
            height: 20px;
            top: -8px;
            right: 10px;
        }

        .cloud2 {
            width: 40px;
            height: 15px;
            top: 80px;
            animation: moveCloud 20s linear infinite;
        }

        .cloud2::before {
            width: 20px;
            height: 20px;
            top: -8px;
            left: 8px;
        }

        .cloud2::after {
            width: 25px;
            height: 15px;
            top: -5px;
            right: 8px;
        }

        @keyframes moveCloud {
            from { right: -100px; }
            to { right: 100%; }
        }

        .jumping {
            bottom: 200px !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="score">Score: 0</div>
        <div id="instructions">Press SPACE or click to jump</div>
        
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        class DinoGame {
            constructor() {
                this.dino = document.getElementById('dino');
                this.gameContainer = document.getElementById('gameContainer');
                this.scoreElement = document.getElementById('score');
                this.gameOverElement = document.getElementById('gameOver');
                this.finalScoreElement = document.getElementById('finalScore');
                
                this.isJumping = false;
                this.isGameRunning = false;
                this.score = 0;
                this.obstacles = [];
                this.gameSpeed = 2;
                this.spawnRate = 0.02;
                
                this.init();
            }
            
            init() {
                this.bindEvents();
                this.startGame();
            }
            
            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.jump();
                    }
                });
                
                this.gameContainer.addEventListener('click', () => {
                    this.jump();
                });
            }
            
            jump() {
                if (!this.isJumping && this.isGameRunning) {
                    this.isJumping = true;
                    this.dino.classList.add('jumping');
                    
                    setTimeout(() => {
                        this.dino.classList.remove('jumping');
                        this.isJumping = false;
                    }, 600);
                }
            }
            
            startGame() {
                this.isGameRunning = true;
                this.score = 0;
                this.obstacles = [];
                this.gameSpeed = 2;
                this.updateScore();
                this.gameLoop();
            }
            
            gameLoop() {
                if (!this.isGameRunning) return;
                
                this.spawnObstacle();
                this.moveObstacles();
                this.checkCollisions();
                this.updateScore();
                this.increaseSpeed();
                
                requestAnimationFrame(() => this.gameLoop());
            }
            
            spawnObstacle() {
                if (Math.random() < this.spawnRate) {
                    const obstacle = document.createElement('div');
                    obstacle.className = 'obstacle';
                    obstacle.style.right = '-20px';
                    this.gameContainer.appendChild(obstacle);
                    this.obstacles.push({
                        element: obstacle,
                        x: 820
                    });
                }
            }
            
            moveObstacles() {
                this.obstacles.forEach((obstacle, index) => {
                    obstacle.x -= this.gameSpeed;
                    obstacle.element.style.right = (820 - obstacle.x) + 'px';
                    
                    if (obstacle.x < -20) {
                        obstacle.element.remove();
                        this.obstacles.splice(index, 1);
                        this.score += 10;
                    }
                });
            }
            
            checkCollisions() {
                const dinoRect = {
                    x: 50,
                    y: this.isJumping ? 200 : 120,
                    width: 40,
                    height: 40
                };
                
                this.obstacles.forEach(obstacle => {
                    const obstacleRect = {
                        x: obstacle.x,
                        y: 120,
                        width: 20,
                        height: 40
                    };
                    
                    if (this.isColliding(dinoRect, obstacleRect)) {
                        this.gameOver();
                    }
                });
            }
            
            isColliding(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }
            
            updateScore() {
                this.scoreElement.textContent = `Score: ${this.score}`;
            }
            
            increaseSpeed() {
                this.gameSpeed += 0.001;
                this.spawnRate = Math.min(0.02 + (this.score * 0.000001), 0.03);
            }
            
            gameOver() {
                this.isGameRunning = false;
                this.finalScoreElement.textContent = this.score;
                this.gameOverElement.style.display = 'block';
                
                // Clean up obstacles
                this.obstacles.forEach(obstacle => {
                    obstacle.element.remove();
                });
                this.obstacles = [];
            }
            
            restart() {
                this.gameOverElement.style.display = 'none';
                this.dino.classList.remove('jumping');
                this.isJumping = false;
                this.startGame();
            }
        }
        
        let game;
        
        function initGame() {
            game = new DinoGame();
        }
        
        function restartGame() {
            game.restart();
        }
        
        // Start the game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
