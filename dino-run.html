<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            width: 800px;
            height: 200px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8B7355 70%, #8B7355 100%);
            position: relative;
            border: 2px solid #333;
            overflow: hidden;
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #8B7355;
            border-top: 2px solid #654321;
        }

        #dino {
            position: absolute;
            bottom: 60px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.3s ease;
        }

        #dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        #dino::after {
            content: '';
            position: absolute;
            top: -5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            bottom: 60px;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 3px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 20px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #228B22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #32CD32;
        }

        .jumping {
            bottom: 140px !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="score">Score: 0</div>
        
        <div id="startScreen">
            <h2>Dino Run</h2>
            <p>Press SPACE or click to jump over obstacles!</p>
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p id="finalScore">Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        let gameState = {
            isPlaying: false,
            score: 0,
            obstacles: [],
            clouds: [],
            gameSpeed: 2,
            isJumping: false,
            jumpHeight: 80
        };

        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const finalScoreElement = document.getElementById('finalScore');

        let gameLoop;
        let obstacleSpawnTimer = 0;
        let cloudSpawnTimer = 0;

        function startGame() {
            gameState.isPlaying = true;
            gameState.score = 0;
            gameState.obstacles = [];
            gameState.clouds = [];
            gameState.gameSpeed = 2;
            gameState.isJumping = false;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Clear existing obstacles and clouds
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
            document.querySelectorAll('.cloud').forEach(cloud => cloud.remove());
            
            gameLoop = setInterval(updateGame, 20);
            
            // Spawn initial clouds
            for (let i = 0; i < 3; i++) {
                spawnCloud();
            }
        }

        function updateGame() {
            if (!gameState.isPlaying) return;
            
            // Update score
            gameState.score += 1;
            scoreElement.textContent = `Score: ${gameState.score}`;
            
            // Increase game speed gradually
            if (gameState.score % 500 === 0) {
                gameState.gameSpeed += 0.5;
            }
            
            // Spawn obstacles
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer > 100 / gameState.gameSpeed) {
                if (Math.random() < 0.7) {
                    spawnObstacle();
                }
                obstacleSpawnTimer = 0;
            }
            
            // Spawn clouds
            cloudSpawnTimer++;
            if (cloudSpawnTimer > 200) {
                spawnCloud();
                cloudSpawnTimer = 0;
            }
            
            // Move and check obstacles
            gameState.obstacles.forEach((obstacle, index) => {
                obstacle.x -= gameState.gameSpeed;
                obstacle.element.style.left = obstacle.x + 'px';
                
                // Remove obstacles that are off screen
                if (obstacle.x < -30) {
                    obstacle.element.remove();
                    gameState.obstacles.splice(index, 1);
                }
                
                // Check collision
                if (checkCollision(obstacle)) {
                    endGame();
                }
            });
            
            // Move clouds
            gameState.clouds.forEach((cloud, index) => {
                cloud.x -= gameState.gameSpeed * 0.3;
                cloud.element.style.left = cloud.x + 'px';
                
                // Remove clouds that are off screen
                if (cloud.x < -100) {
                    cloud.element.remove();
                    gameState.clouds.splice(index, 1);
                }
            });
        }

        function spawnObstacle() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.style.left = '800px';
            gameContainer.appendChild(obstacle);
            
            gameState.obstacles.push({
                element: obstacle,
                x: 800,
                width: 20,
                height: 40
            });
        }

        function spawnCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.left = '800px';
            cloud.style.top = Math.random() * 60 + 20 + 'px';
            cloud.style.width = '40px';
            cloud.style.height = '20px';
            
            // Add cloud details
            cloud.style.setProperty('--before-left', '-10px');
            cloud.style.setProperty('--before-top', '-5px');
            cloud.style.setProperty('--before-width', '25px');
            cloud.style.setProperty('--before-height', '25px');
            cloud.style.setProperty('--after-right', '-10px');
            cloud.style.setProperty('--after-top', '-8px');
            cloud.style.setProperty('--after-width', '30px');
            cloud.style.setProperty('--after-height', '20px');
            
            gameContainer.appendChild(cloud);
            
            gameState.clouds.push({
                element: cloud,
                x: 800
            });
        }

        function jump() {
            if (!gameState.isPlaying || gameState.isJumping) return;
            
            gameState.isJumping = true;
            dino.classList.add('jumping');
            
            setTimeout(() => {
                dino.classList.remove('jumping');
                gameState.isJumping = false;
            }, 600);
        }

        function checkCollision(obstacle) {
            const dinoRect = {
                x: 50,
                y: gameState.isJumping ? 60 : 60,
                width: 40,
                height: 40
            };
            
            const obstacleRect = {
                x: obstacle.x,
                y: 60,
                width: obstacle.width,
                height: obstacle.height
            };
            
            return dinoRect.x < obstacleRect.x + obstacleRect.width &&
                   dinoRect.x + dinoRect.width > obstacleRect.x &&
                   dinoRect.y < obstacleRect.y + obstacleRect.height &&
                   dinoRect.y + dinoRect.height > obstacleRect.y;
        }

        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = `Score: ${gameState.score}`;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameState.isPlaying && startScreen.style.display !== 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        document.addEventListener('click', () => {
            if (!gameState.isPlaying && startScreen.style.display !== 'none') {
                startGame();
            } else if (gameState.isPlaying) {
                jump();
            }
        });

        // Prevent spacebar from scrolling the page
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 32 && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
