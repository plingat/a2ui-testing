<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            width: 800px;
            height: 400px;
            position: relative;
            border: 2px solid #333;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #DEB887 70%, #DEB887 100%);
            overflow: hidden;
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #DEB887;
            border-top: 2px solid #8B4513;
        }

        #dino {
            position: absolute;
            bottom: 120px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.3s ease;
        }

        #dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        #dino::after {
            content: '';
            position: absolute;
            top: -5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            bottom: 120px;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 3px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50px;
        }

        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }

        .cloud::after {
            width: 60px;
            height: 60px;
            top: -35px;
            right: 10px;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #228B22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #32CD32;
        }

        .jumping {
            bottom: 200px !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="score">Score: 0</div>
        
        <div id="startScreen">
            <h2>Dino Run</h2>
            <p>Press SPACE or click to jump over obstacles!</p>
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p id="finalScore">Score: 0</p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        let gameRunning = false;
        let score = 0;
        let gameSpeed = 2;
        let obstacles = [];
        let clouds = [];
        let isJumping = false;
        let gameLoop;

        const dino = document.getElementById('dino');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const startScreen = document.getElementById('startScreen');
        const finalScoreElement = document.getElementById('finalScore');

        function startGame() {
            gameRunning = true;
            score = 0;
            gameSpeed = 2;
            obstacles = [];
            clouds = [];
            isJumping = false;
            
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            // Clear any existing obstacles and clouds
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
            document.querySelectorAll('.cloud').forEach(cloud => cloud.remove());
            
            // Reset dino position
            dino.classList.remove('jumping');
            
            gameLoop = setInterval(updateGame, 20);
            
            // Create initial clouds
            createCloud();
        }

        function updateGame() {
            if (!gameRunning) return;
            
            // Update score
            score += 1;
            scoreElement.textContent = `Score: ${score}`;
            
            // Increase game speed gradually
            if (score % 500 === 0) {
                gameSpeed += 0.5;
            }
            
            // Create obstacles
            if (Math.random() < 0.01) {
                createObstacle();
            }
            
            // Create clouds
            if (Math.random() < 0.005) {
                createCloud();
            }
            
            // Move and check obstacles
            obstacles.forEach((obstacle, index) => {
                obstacle.x -= gameSpeed;
                obstacle.element.style.left = obstacle.x + 'px';
                
                // Remove obstacles that are off screen
                if (obstacle.x < -20) {
                    obstacle.element.remove();
                    obstacles.splice(index, 1);
                }
                
                // Check collision
                if (checkCollision(obstacle)) {
                    endGame();
                }
            });
            
            // Move clouds
            clouds.forEach((cloud, index) => {
                cloud.x -= gameSpeed * 0.3;
                cloud.element.style.left = cloud.x + 'px';
                
                // Remove clouds that are off screen
                if (cloud.x < -100) {
                    cloud.element.remove();
                    clouds.splice(index, 1);
                }
            });
        }

        function createObstacle() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.style.left = '800px';
            gameContainer.appendChild(obstacle);
            
            obstacles.push({
                element: obstacle,
                x: 800
            });
        }

        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.width = '80px';
            cloud.style.height = '40px';
            cloud.style.left = '800px';
            cloud.style.top = Math.random() * 100 + 20 + 'px';
            gameContainer.appendChild(cloud);
            
            clouds.push({
                element: cloud,
                x: 800
            });
        }

        function jump() {
            if (!gameRunning || isJumping) return;
            
            isJumping = true;
            dino.classList.add('jumping');
            
            setTimeout(() => {
                dino.classList.remove('jumping');
                isJumping = false;
            }, 600);
        }

        function checkCollision(obstacle) {
            const dinoRect = {
                left: 50,
                right: 90,
                top: isJumping ? 200 : 120,
                bottom: isJumping ? 240 : 160
            };
            
            const obstacleRect = {
                left: obstacle.x,
                right: obstacle.x + 20,
                top: 120,
                bottom: 160
            };
            
            return dinoRect.left < obstacleRect.right &&
                   dinoRect.right > obstacleRect.left &&
                   dinoRect.top < obstacleRect.bottom &&
                   dinoRect.bottom > obstacleRect.top;
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = `Score: ${score}`;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            startGame();
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning && startScreen.style.display !== 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        document.addEventListener('click', () => {
            if (gameRunning) {
                jump();
            }
        });

        // Prevent space bar from scrolling
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 32 && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
