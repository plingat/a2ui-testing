<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 800px;
            height: 200px;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #8B4513 70%, #8B4513 100%);
            position: relative;
            border: 2px solid #333;
            overflow: hidden;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #8B4513;
            border-top: 2px solid #654321;
        }

        .dino {
            position: absolute;
            bottom: 60px;
            left: 50px;
            width: 40px;
            height: 40px;
            background: #228B22;
            border-radius: 5px;
            transition: bottom 0.3s ease;
        }

        .dino::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 30px;
            height: 20px;
            background: #228B22;
            border-radius: 10px;
        }

        .dino::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 15px;
            height: 15px;
            background: #228B22;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            bottom: 60px;
            width: 20px;
            height: 40px;
            background: #8B0000;
            border-radius: 3px;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50px;
        }

        .cloud1 {
            width: 50px;
            height: 20px;
            top: 30px;
            animation: moveCloud 8s linear infinite;
        }

        .cloud1::before {
            width: 25px;
            height: 25px;
            top: -12px;
            left: 10px;
        }

        .cloud1::after {
            width: 30px;
            height: 20px;
            top: -8px;
            right: 15px;
        }

        @keyframes moveCloud {
            from { right: -100px; }
            to { right: 100%; }
        }

        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .game-over h2 {
            color: #8B0000;
            margin-bottom: 10px;
        }

        .restart-btn {
            background: #228B22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .restart-btn:hover {
            background: #32CD32;
        }

        .instructions {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="instructions">Press SPACE or click to jump</div>
        <div class="score" id="score">Score: 0</div>
        <div class="ground"></div>
        <div class="dino" id="dino"></div>
        <div class="cloud cloud1"></div>
        
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        class DinoGame {
            constructor() {
                this.dino = document.getElementById('dino');
                this.gameContainer = document.getElementById('gameContainer');
                this.scoreElement = document.getElementById('score');
                this.gameOverElement = document.getElementById('gameOver');
                this.finalScoreElement = document.getElementById('finalScore');
                
                this.isJumping = false;
                this.isGameRunning = false;
                this.score = 0;
                this.obstacles = [];
                this.gameSpeed = 2;
                this.obstacleSpawnRate = 0.02;
                
                this.init();
            }
            
            init() {
                this.bindEvents();
                this.startGame();
            }
            
            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.jump();
                    }
                });
                
                this.gameContainer.addEventListener('click', () => {
                    this.jump();
                });
            }
            
            jump() {
                if (!this.isGameRunning) return;
                
                if (!this.isJumping) {
                    this.isJumping = true;
                    this.dino.style.bottom = '140px';
                    
                    setTimeout(() => {
                        this.dino.style.bottom = '60px';
                        setTimeout(() => {
                            this.isJumping = false;
                        }, 300);
                    }, 300);
                }
            }
            
            createObstacle() {
                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle';
                obstacle.style.right = '-20px';
                this.gameContainer.appendChild(obstacle);
                this.obstacles.push(obstacle);
            }
            
            moveObstacles() {
                this.obstacles.forEach((obstacle, index) => {
                    const currentRight = parseInt(obstacle.style.right) || 0;
                    obstacle.style.right = (currentRight + this.gameSpeed) + 'px';
                    
                    // Remove obstacle if it's off screen
                    if (currentRight > 820) {
                        obstacle.remove();
                        this.obstacles.splice(index, 1);
                        this.score += 10;
                        this.updateScore();
                    }
                });
            }
            
            checkCollision() {
                const dinoRect = this.dino.getBoundingClientRect();
                
                this.obstacles.forEach(obstacle => {
                    const obstacleRect = obstacle.getBoundingClientRect();
                    
                    if (dinoRect.left < obstacleRect.right &&
                        dinoRect.right > obstacleRect.left &&
                        dinoRect.top < obstacleRect.bottom &&
                        dinoRect.bottom > obstacleRect.top) {
                        this.gameOver();
                    }
                });
            }
            
            updateScore() {
                this.scoreElement.textContent = `Score: ${this.score}`;
                
                // Increase game speed every 100 points
                if (this.score % 100 === 0 && this.score > 0) {
                    this.gameSpeed += 0.5;
                    this.obstacleSpawnRate += 0.005;
                }
            }
            
            gameLoop() {
                if (!this.isGameRunning) return;
                
                // Spawn obstacles
                if (Math.random() < this.obstacleSpawnRate) {
                    this.createObstacle();
                }
                
                this.moveObstacles();
                this.checkCollision();
                
                requestAnimationFrame(() => this.gameLoop());
            }
            
            startGame() {
                this.isGameRunning = true;
                this.score = 0;
                this.gameSpeed = 2;
                this.obstacleSpawnRate = 0.02;
                this.updateScore();
                this.gameOverElement.style.display = 'none';
                this.gameLoop();
            }
            
            gameOver() {
                this.isGameRunning = false;
                this.finalScoreElement.textContent = this.score;
                this.gameOverElement.style.display = 'block';
                
                // Clear obstacles
                this.obstacles.forEach(obstacle => obstacle.remove());
                this.obstacles = [];
            }
            
            restart() {
                this.dino.style.bottom = '60px';
                this.isJumping = false;
                this.startGame();
            }
        }
        
        // Initialize game
        let game = new DinoGame();
        
        // Restart function for button
        function restartGame() {
            game.restart();
        }
    </script>
</body>
</html>
